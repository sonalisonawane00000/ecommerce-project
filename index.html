<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShopEasy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>ShopEasy</h2>
  <input type="text" id="search" placeholder="Search products...">
  <button id="cart-btn">Cart</button>
  <button id="admin-btn">Admin</button>
  <button id="login-btn">Login</button>
  <button id="logout-btn" style="display:none;">Logout</button>
</header>

<div class="container">
  <div id="products-container"></div>
</div>

<!-- AUTH -->
<div id="auth-modal" class="modal">
  <div class="modal-box">
    <h2 id="auth-title">Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button id="auth-submit">Submit</button>
    <p id="toggle-auth">New user? Register</p>
  </div>
</div>

<!-- CART -->
<div id="cart-modal" class="modal">
  <div class="modal-box">
    <h2>Cart</h2>
    <ul id="cart-items"></ul>
    <button id="checkout">Checkout</button>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-panel" class="modal">
  <div class="modal-box">
    <h2>Admin Panel</h2>

    <input id="p-title" placeholder="Title">
    <input id="p-price" placeholder="Price">
    <input id="p-image" placeholder="Image URL">
    <button id="add-product">Add Product</button>

    <h3>Products</h3>
    <ul id="admin-products"></ul>

    <h3>Orders</h3>
    <ul id="admin-orders"></ul>

    <button onclick="closeAdmin()">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
